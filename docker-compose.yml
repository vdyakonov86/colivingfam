services:
  vpn_bot:
    build: .
    container_name: colivingfam-vpn-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./vpn_bot:/app/vpn_bot:rw
      - ./config:/app/vpn_bot/config:rw
      - ./data:/data:rw
    command: ["sh", "-c", "watchfiles --filter python 'python -m vpn_bot' /app/vpn_bot"]
